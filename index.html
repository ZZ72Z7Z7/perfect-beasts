<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PERFECT BEASTS</title>
<meta property="og:title" content="PERFECT BEASTS">
<meta property="og:description" content="A modern bouffon performance featuring the Minotaur and Mimi. Get tickets and workshop info.">
<meta property="og:type" content="website">
<meta name="description" content="Perfect Beasts — A modern bouffon performance featuring the Minotaur and Mimi. Get tickets and workshop info.">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --card-shadow: drop-shadow(0 3px 5px rgba(0,0,0,0.165)) drop-shadow(0 9px 18px rgba(0,0,0,0.113));
  }

  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    background-color: #7a6450;
    background-image: url("images/table-bg.jpg");
    background-size: 800px;
    background-repeat: repeat;
  }

  .card-grid {
    display: flex;
    flex-wrap: wrap;
    max-width: 1600px;
    width: 100%;
    padding: 60px;
    gap: 24px;
  }

  .card-link {
    display: block;
    width: calc(50% - 12px);
    aspect-ratio: 1200 / 1665;
    cursor: pointer;
  }

  .card-link img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    transition: transform 0.35s ease;
    filter: var(--card-shadow);
    border-radius: 3.5%;
  }

  .card-link:hover img {
    transform: scale(1.03);
  }

  @media (max-width: 1200px) {
    body {
      overflow: hidden;
      height: 100vh;
    }
    .card-grid {
      flex-direction: column;
      flex-wrap: nowrap;
      overflow-y: auto;
      overflow-x: hidden;
      scroll-snap-type: y mandatory;
      padding: 6vh 0;
      gap: 0;
      height: 100vh;
      max-width: 100vw;
      scrollbar-width: none;
    }
    .card-grid::-webkit-scrollbar {
      display: none;
    }
    .card-link {
      flex: 0 0 88vh;
      width: 100vw;
      height: 88vh;
      scroll-snap-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      aspect-ratio: auto;
      cursor: default;
    }
    .card-link img {
      width: auto;
      max-width: 95vw;
      height: auto;
      max-height: calc(88vh - 20px);
      object-fit: contain;
      transition: none;
      filter: var(--card-shadow);
    }
    .card-link:hover img {
      transform: none;
    }
  }

  @media (min-width: 2001px) {
    .card-grid {
      max-width: 2400px;
    }
    .card-link {
      width: calc(33.333% - 16px);
    }
  }

  /* Cards with overlay buttons */
  .card-container {
    position: relative;
    width: calc(50% - 12px);
    aspect-ratio: 1200 / 1665;
    cursor: pointer;
    transition: transform 0.35s ease;
  }

  .card-container:hover {
    transform: scale(1.03);
  }

  .card-container img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    filter: var(--card-shadow);
    border-radius: 3.5%;
  }

  .card-container .card-link-bg {
    display: block;
    width: 100%;
    height: 100%;
    position: relative;
  }

  .tickets-btn {
    position: absolute;
    left: 12.8%;
    width: 75.1%;
    height: 10.2%;
    bottom: 7.4%;
    text-decoration: none;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    z-index: 2;
    background: transparent;
    color: transparent;
    font-size: 0;
    transition: background 0.2s ease;
  }

  .tickets-btn:hover {
    backdrop-filter: brightness(1.12);
    -webkit-backdrop-filter: brightness(1.12);
  }

  .btn-workshop-info {
    bottom: 22.6%;
    left: 12.6%;
    width: 73.8%;
  }

  .btn-workshop-contact {
    bottom: 7.5%;
    left: 12.6%;
    width: 73.8%;
  }

  @media (max-width: 1200px) {
    .card-container {
      flex: 0 0 88vh;
      width: 100vw;
      height: 88vh;
      scroll-snap-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      aspect-ratio: auto;
      transition: none;
      cursor: default;
    }
    .card-container .card-link-bg {
      position: relative;
      display: block;
      width: fit-content;
      height: fit-content;
    }
    .card-container img {
      width: auto;
      max-width: 95vw;
      height: auto;
      max-height: calc(88vh - 20px);
      display: block;
      filter: var(--card-shadow);
    }
    .card-container .tickets-btn {
      position: absolute;
    }
    .card-container:hover {
      transform: none;
    }
  }

  @media (min-width: 2001px) {
    .card-container {
      width: calc(33.333% - 16px);
    }
  }

  /* Lightbox */
  .lightbox-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.75);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    cursor: pointer;
  }

  .lightbox-overlay.active {
    display: flex;
  }

  .lightbox-inner {
    position: relative;
    height: 95vh;
    aspect-ratio: 1200 / 1665;
    max-width: 100vw;
  }

  .lightbox-overlay img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    pointer-events: none;
    border-radius: 3.5%;
  }

  .lightbox-btn {
    display: none;
    position: absolute;
    pointer-events: auto;
    cursor: pointer;
    background: transparent;
    border-radius: 14px;
    text-decoration: none;
    border: none;
    color: transparent;
    font-size: 0;
    transition: background 0.2s ease;
  }

  .lightbox-btn:hover {
    backdrop-filter: brightness(1.12);
    -webkit-backdrop-filter: brightness(1.12);
  }

  .lb-card2-tickets {
    bottom: 7.4%;
    left: 12.8%;
    width: 75.1%;
    height: 10.2%;
  }

  .lb-card6-info {
    bottom: 22.6%;
    left: 12.6%;
    width: 73.8%;
    height: 10.2%;
  }

  .lb-card6-contact {
    bottom: 7.5%;
    left: 12.6%;
    width: 73.8%;
    height: 10.2%;
  }

  .lightbox-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 56px;
    height: 56px;
    border: none;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.18);
    color: rgba(255, 255, 255, 0.85);
    font-size: 28px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-bottom: 2px;
    transition: background 0.2s ease, color 0.2s ease;
    z-index: 1001;
    pointer-events: auto;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }

  .lightbox-arrow:hover {
    background: rgba(255, 255, 255, 0.3);
    color: #fff;
  }

  /* Arrow offset: 47.5vh = half of .lightbox-inner 95vh height;
     * 1200/1665 converts height to width via aspect ratio;
     * result is the gap between lightbox edge and viewport edge */
  .lightbox-arrow-left {
    left: calc((50% - 47.5vh * 1200/1665) / 4 * 3 - 28px);
    padding-right: 3px;
  }

  .lightbox-arrow-right {
    right: calc((50% - 47.5vh * 1200/1665) / 4 * 3 - 28px);
    padding-left: 3px;
  }

  @media (max-width: 600px) {
    .lightbox-arrow {
      width: 40px;
      height: 40px;
      font-size: 20px;
    }
    .lightbox-arrow-left { left: calc((50% - 47.5vh * 1200/1665) / 4 * 3 - 20px); }
    .lightbox-arrow-right { right: calc((50% - 47.5vh * 1200/1665) / 4 * 3 - 20px); }
  }

  /* Landscape grid - triggered by JS .landscape-mode class */
  body.landscape-mode {
    overflow: auto;
    height: auto;
  }
  body.landscape-mode .card-grid {
    flex-direction: row;
    flex-wrap: wrap;
    overflow-y: auto;
    overflow-x: hidden;
    scroll-snap-type: none;
    padding: 40px;
    gap: 24px;
    height: auto;
    max-width: 1600px;
  }
  body.landscape-mode .card-link {
    flex: none;
    width: calc(50% - 12px);
    height: auto;
    scroll-snap-align: none;
    display: block;
    aspect-ratio: 1200 / 1665;
    cursor: pointer;
  }
  body.landscape-mode .card-container {
    flex: none;
    width: calc(50% - 12px);
    height: auto;
    scroll-snap-align: none;
    display: block;
    aspect-ratio: 1200 / 1665;
    cursor: pointer;
    transition: transform 0.35s ease;
  }
  body.landscape-mode .card-link picture,
  body.landscape-mode .card-container picture {
    display: block;
    width: 100%;
    height: 100%;
  }
  body.landscape-mode .card-link img,
  body.landscape-mode .card-container img,
  body.landscape-mode picture img {
    width: 100%;
    height: 100%;
    max-width: none;
    max-height: none;
    object-fit: contain;
    border-radius: 3.5%;
  }
  body.landscape-mode .card-link:hover img {
    transform: scale(1.03);
  }
  body.landscape-mode .card-container:hover {
    transform: scale(1.03);
  }

  @media (max-width: 1200px) {
    picture img {
      width: auto;
      max-width: 95vw;
      height: auto;
      max-height: calc(88vh - 20px);
      display: block;
      border-radius: 3.5%;
    }
  }


  /* Landscape lightbox - triggered by JS .landscape-mode class */
  body.landscape-mode .lightbox-overlay.active {
    display: block;
    overflow-y: scroll;
    -webkit-overflow-scrolling: touch;
    background: rgba(0, 0, 0, 0.85);
  }
  body.landscape-mode .lightbox-inner {
    height: auto;
    width: 60vw;
    aspect-ratio: auto;
    max-width: none;
    margin: 0 auto;
    padding: 3vh 0;
  }
  body.landscape-mode .lightbox-overlay img {
    width: 100%;
    height: auto;
    pointer-events: auto;
    object-fit: contain;
    border-radius: 3.5%;
    display: block;
  }
  body.landscape-mode .lightbox-arrow {
    display: none !important;
  }

  /* Card flip animation - 9:16 mobile only */
  .card-flip-container {
    perspective: 1200px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-flip-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.5s ease;
    transform-style: preserve-3d;
  }

  .card-flip-inner.flipped {
    transform: rotateY(180deg);
  }

  .card-flip-front,
  .card-flip-back {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }

  .card-flip-back {
    transform: rotateY(180deg);
  }

  .card-flip-front img,
  .card-flip-back img {
    width: auto;
    max-width: 95vw;
    height: auto;
    max-height: calc(88vh - 20px);
    object-fit: contain;
    filter: var(--card-shadow);
    border-radius: 3.5%;
    display: block;
  }

  .flip-hint {
    position: absolute;
    bottom: 8px;
    left: 0;
    right: 0;
    text-align: center;
    color: rgba(255, 255, 255, 0.6);
    font-size: 12px;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  .flip-hint.visible {
    opacity: 1;
  }

  @keyframes card-wobble {
    0% { transform: rotateY(0deg); }
    25% { transform: rotateY(4deg); }
    50% { transform: rotateY(-3deg); }
    75% { transform: rotateY(2deg); }
    100% { transform: rotateY(0deg); }
  }

  .card-flip-inner.wobble {
    animation: card-wobble 0.6s ease;
  }
</style>
</head>
<body>
<div class="card-grid">
  <div class="card-link">
    <picture>
      <source media="(max-width: 1200px) and (max-aspect-ratio: 3/4)" srcset="images/card-01_mobile.jpg">
      <img src="images/card-01.jpg" alt="Perfect Beasts" width="1200" height="1665">
    </picture>
  </div>
  <div class="card-container">
    <div class="card-link-bg">
      <picture>
        <source media="(max-width: 1200px) and (max-aspect-ratio: 3/4)" srcset="images/card-02_mobile.jpg">
        <img src="images/card-02.jpg" loading="lazy" alt="Modern Bouffon" width="1200" height="1665">
      </picture>
      <a class="tickets-btn" href="https://events.humanitix.com/perfect-beasts-show?h=SiM6BMJovS77kORXZSL4397t2JGi-UL91hsHhQG78Pg&amp;t=1773109967777" target="_blank" rel="noopener">Tickets</a>
    </div>
  </div>
  <div class="card-link">
    <picture>
      <source media="(max-width: 1200px) and (max-aspect-ratio: 3/4)" srcset="images/card-03_mobile.jpg">
      <img src="images/card-03.jpg" loading="lazy" alt="Bouffon Info" width="1200" height="1665">
    </picture>
  </div>
  <div class="card-link">
    <picture>
      <source media="(max-width: 1200px) and (max-aspect-ratio: 3/4)" srcset="images/card-04_mobile_front.jpg">
      <img src="images/card-04.jpg" loading="lazy" alt="Minotaur" data-flip-front="images/card-04_mobile_front.jpg" data-flip-back="images/card-04_mobile_back.jpg" width="1200" height="1665">
    </picture>
  </div>
  <div class="card-link">
    <picture>
      <source media="(max-width: 1200px) and (max-aspect-ratio: 3/4)" srcset="images/card-05_mobile_front.jpg">
      <img src="images/card-05.jpg" loading="lazy" alt="Mimi" data-flip-front="images/card-05_mobile_front.jpg" data-flip-back="images/card-05_mobile_back.jpg" width="1200" height="1665">
    </picture>
  </div>
  <div class="card-container">
    <div class="card-link-bg">
      <picture>
        <source media="(max-width: 1200px) and (max-aspect-ratio: 3/4)" srcset="images/card-06_mobile.jpg">
        <img src="images/card-06.jpg" loading="lazy" alt="Workshop" width="1200" height="1665">
      </picture>
      <a class="tickets-btn btn-workshop-info" href="https://events.humanitix.com/perfect-beasts-workshop?h=KWJzFsmMzytsI2L-ip8YO90t5slrTo0ZabbFX4dDF9o&amp;t=1773102944347" target="_blank" rel="noopener">Info & Registration</a>
      <a class="tickets-btn btn-workshop-contact" href="mailto:betesparfaites@protonmail.com">Contact</a>
    </div>
  </div>
</div>

<div class="lightbox-overlay" id="lightbox">
  <button class="lightbox-arrow lightbox-arrow-left" id="lightbox-prev">&#8249;</button>
  <div class="lightbox-inner">
    <img id="lightbox-img" src="" alt="Lightbox">
    <a class="lightbox-btn lb-card2-tickets" href="https://events.humanitix.com/perfect-beasts-show?h=SiM6BMJovS77kORXZSL4397t2JGi-UL91hsHhQG78Pg&amp;t=1773109967777" target="_blank" rel="noopener">Tickets</a>
    <a class="lightbox-btn lb-card6-info" href="https://events.humanitix.com/perfect-beasts-workshop?h=KWJzFsmMzytsI2L-ip8YO90t5slrTo0ZabbFX4dDF9o&amp;t=1773102944347" target="_blank" rel="noopener">Info & Registration</a>
    <a class="lightbox-btn lb-card6-contact" href="mailto:betesparfaites@protonmail.com">Contact</a>
  </div>
  <button class="lightbox-arrow lightbox-arrow-right" id="lightbox-next">&#8250;</button>
</div>
<script>
  var overlay = document.getElementById('lightbox');
  var lightboxImg = document.getElementById('lightbox-img');
  var lbCard2Tickets = document.querySelector('.lb-card2-tickets');
  var lbCard6Info = document.querySelector('.lb-card6-info');
  var lbCard6Contact = document.querySelector('.lb-card6-contact');
  var prevBtn = document.getElementById('lightbox-prev');
  var nextBtn = document.getElementById('lightbox-next');

  var cards = [];
  document.querySelectorAll('.card-link, .card-container').forEach(function(card, idx) {
    var img = card.querySelector('img');
    if (img) {
      cards.push({ src: img.src, cardIndex: idx, el: card });
    }
  });

  var currentIndex = 0;

  function showCard(index) {
    currentIndex = index;
    lightboxImg.src = cards[index].src;
    var ci = cards[index].cardIndex;
    lbCard2Tickets.style.display = ci === 1 ? 'block' : 'none';
    lbCard6Info.style.display = ci === 5 ? 'block' : 'none';
    lbCard6Contact.style.display = ci === 5 ? 'block' : 'none';
  }

  function closeLightbox() {
    overlay.classList.remove('active');
    document.body.style.overflow = '';
  }

  function isMobile() {
    return window.innerWidth <= 1200 && window.innerHeight > window.innerWidth;
  }

  function is916Mode() {
    return window.innerWidth <= 1200 && (window.innerHeight / window.innerWidth) > (4 / 3);
  }

  cards.forEach(function(card, i) {
    card.el.addEventListener('click', function(e) {
      if (e.target.closest('.tickets-btn')) return;
      if (isMobile()) return;
      e.preventDefault();
      var currentImg = card.el.querySelector('img');
      if (currentImg) cards[i].src = currentImg.currentSrc || currentImg.src;
      showCard(i);
      overlay.classList.add('active');
      document.body.style.overflow = 'hidden';
      overlay.scrollTop = 0;
    });
  });

  prevBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    showCard((currentIndex - 1 + cards.length) % cards.length);
    overlay.scrollTop = 0;
  });

  nextBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    showCard((currentIndex + 1) % cards.length);
    overlay.scrollTop = 0;
  });

  overlay.addEventListener('click', function(e) {
    if (e.target.closest('.lightbox-arrow')) return;
    if (e.target.closest('.lightbox-btn')) return;
    closeLightbox();
  });

  document.addEventListener('keydown', function(e) {
    if (!overlay.classList.contains('active')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') showCard((currentIndex - 1 + cards.length) % cards.length);
    if (e.key === 'ArrowRight') showCard((currentIndex + 1) % cards.length);
  });

  function updateOrientation() {
    if (window.innerWidth <= 1200 && window.innerWidth > window.innerHeight) {
      document.body.classList.add('landscape-mode');
    } else {
      document.body.classList.remove('landscape-mode');
    }
  }
  updateOrientation();
  window.addEventListener('resize', updateOrientation);
  window.addEventListener('orientationchange', function() {
    setTimeout(updateOrientation, 100);
  });

  var grid = document.querySelector('.card-grid');

  window.addEventListener('load', function() {
    if (isMobile()) {
      setTimeout(function() {
        grid.scrollTo({ top: 60, behavior: 'smooth' });
        setTimeout(function() {
          grid.scrollTo({ top: 0, behavior: 'smooth' });
        }, 400);
      }, 800);
    }
  });

  // Card flip functionality for cards 4 and 5 in 9:16 mode
  function setupFlipCards() {
    var flippableImgs = document.querySelectorAll('img[data-flip-front]');

    flippableImgs.forEach(function(img) {
      var cardLink = img.closest('.card-link');
      if (!cardLink) return;

      var picture = img.closest('picture');
      var container = picture ? picture.parentElement : img.parentElement;

      var flipContainer = document.createElement('div');
      flipContainer.className = 'card-flip-container';

      var flipInner = document.createElement('div');
      flipInner.className = 'card-flip-inner';

      var flipFront = document.createElement('div');
      flipFront.className = 'card-flip-front';

      var flipBack = document.createElement('div');
      flipBack.className = 'card-flip-back';

      var backImg = document.createElement('img');
      backImg.src = img.dataset.flipBack;
      backImg.alt = img.alt + ' (back)';
      backImg.loading = 'lazy';

      if (picture) {
        flipFront.appendChild(picture);
      } else {
        flipFront.appendChild(img);
      }

      flipBack.appendChild(backImg);
      flipInner.appendChild(flipFront);
      flipInner.appendChild(flipBack);
      flipContainer.appendChild(flipInner);

      var hint = document.createElement('div');
      hint.className = 'flip-hint';
      hint.textContent = 'tap to flip';
      flipContainer.appendChild(hint);

      container.appendChild(flipContainer);

      function sizeFlip() {
        var frontImg = flipFront.querySelector('img');
        if (frontImg && frontImg.offsetHeight > 0) {
          flipContainer.style.width = frontImg.offsetWidth + 'px';
          flipContainer.style.height = frontImg.offsetHeight + 'px';
        }
      }

      var fImg = flipFront.querySelector('img');
      if (fImg) {
        fImg.addEventListener('load', sizeFlip);
        if (fImg.complete) sizeFlip();
      }
      backImg.addEventListener('load', sizeFlip);
      window.addEventListener('resize', sizeFlip);

      var touchMoved = false;
      cardLink.addEventListener('touchstart', function() {
        touchMoved = false;
      }, { passive: true });
      cardLink.addEventListener('touchmove', function() {
        touchMoved = true;
      }, { passive: true });

      cardLink.addEventListener('click', function(e) {
        if (!is916Mode()) return;
        if (touchMoved) return;
        e.preventDefault();
        e.stopPropagation();
        flipInner.classList.toggle('flipped');
      });

      cardLink._flipHint = hint;
    });

    setTimeout(function() {
      if (is916Mode()) {
        document.querySelectorAll('.flip-hint').forEach(function(hint) {
          hint.classList.add('visible');
          setTimeout(function() {
            hint.classList.remove('visible');
          }, 2500);
        });
      }
    }, 1500);
  }

  setupFlipCards();

  // Wobble hint when flippable cards scroll into view
  if (is916Mode()) {
    var wobbled = {};
    var flipInners = document.querySelectorAll('.card-flip-inner');

    var wobbleObserver = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (!entry.isIntersecting) return;
        var el = entry.target;
        var id = el.closest('.card-link').querySelector('img').alt;
        if (wobbled[id]) return;
        wobbled[id] = true;
        setTimeout(function() {
          el.classList.add('wobble');
          el.addEventListener('animationend', function() {
            el.classList.remove('wobble');
          }, { once: true });
        }, 1000);
      });
    }, { threshold: 0.8 });

    flipInners.forEach(function(inner) {
      wobbleObserver.observe(inner);
    });
  }
</script>
</body>
</html>
