<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfect Beasts — Modern Bouffon</title>
<meta property="og:title" content="Perfect Beasts — Modern Bouffon">
<meta property="og:description" content="A modern bouffon performance featuring the Minotaur and Mimi. Get tickets and workshop info.">
<meta property="og:type" content="website">
<meta name="description" content="Perfect Beasts — A modern bouffon performance featuring the Minotaur and Mimi. Get tickets and workshop info.">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --card-shadow: drop-shadow(0 3px 5px rgba(0,0,0,0.165)) drop-shadow(0 9px 18px rgba(0,0,0,0.113));
  }

  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    background-color: #7a6450;
    background-image: url("images/table-bg.jpg");
    background-size: 800px;
    background-repeat: repeat;
  }

  .card-grid {
    display: flex;
    flex-wrap: wrap;
    max-width: 1600px;
    width: 100%;
    padding: 60px;
    gap: 24px;
  }

  .card-link {
    display: block;
    width: calc(50% - 12px);
    aspect-ratio: 1200 / 1665;
    cursor: pointer;
  }

  .card-link img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    transition: transform 0.35s ease;
    filter: var(--card-shadow);
    border-radius: 3.5%;
  }

  .card-link:hover img {
    transform: scale(1.03);
  }

  

  @media (max-width: 1200px) {
body {
      overflow: hidden;
      height: 100vh;
    }
    .card-grid {
      flex-direction: column;
      flex-wrap: nowrap;
      overflow-y: auto;
      overflow-x: hidden;
      scroll-snap-type: y mandatory;
      padding: 6vh 0;
      gap: 0;
      height: 100vh;
      max-width: 100vw;
      scrollbar-width: none;
    }
    .card-grid::-webkit-scrollbar {
      display: none;
    }
    .card-link {
      flex: 0 0 88vh;
      width: 100vw;
      height: 88vh;
      scroll-snap-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      aspect-ratio: auto;
      cursor: default;
    }
    .card-link img {
      width: auto;
      max-width: 95vw;
      height: auto;
      max-height: calc(88vh - 20px);
      object-fit: contain;
      transition: none;
      filter: var(--card-shadow);
    }
    .card-link:hover img {
      transform: none;
    }
  }

  @media (min-width: 2001px) {
    .card-grid {
      max-width: 2400px;
    }
    .card-link {
      width: calc(33.333% - 16px);
    }
  }

  /* Cards with overlay buttons */
  .card-container {
    position: relative;
    width: calc(50% - 12px);
    aspect-ratio: 1200 / 1665;
    cursor: pointer;
    transition: transform 0.35s ease;
  }

  .card-container:hover {
    transform: scale(1.03);
  }

  .card-container img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    filter: var(--card-shadow);
    border-radius: 3.5%;
  }

  .card-container .card-link-bg {
    display: block;
    width: 100%;
    height: 100%;
    position: relative;
  }

  .tickets-btn {
    position: absolute;
    left: 12.8%;
    width: 75.1%;
    height: 10.2%;
    bottom: 7.4%;
    text-decoration: none;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    z-index: 2;
    background: transparent;
    color: transparent;
    font-size: 0;
    transition: background 0.2s ease;
  }

  .tickets-btn:hover {
    backdrop-filter: brightness(1.12);
    -webkit-backdrop-filter: brightness(1.12);
  }

  .btn-workshop-info {
    bottom: 22.6%;
    left: 12.6%;
    width: 73.8%;
  }

  .btn-workshop-contact {
    bottom: 7.5%;
    left: 12.6%;
    width: 73.8%;
  }

  @media (max-width: 1200px) {
    .card-container {
      flex: 0 0 88vh;
      width: 100vw;
      height: 88vh;
      scroll-snap-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      aspect-ratio: auto;
      transition: none;
      cursor: default;
    }
    .card-container .card-link-bg {
      position: relative;
      display: block;
      width: fit-content;
      height: fit-content;
    }
    .card-container img {
      width: auto;
      max-width: 95vw;
      height: auto;
      max-height: calc(88vh - 20px);
      display: block;
      filter: var(--card-shadow);
    }
    .card-container .tickets-btn {
      position: absolute;
    }
    .card-container:hover {
      transform: none;
    }
  }

  @media (min-width: 2001px) {
    .card-container {
      width: calc(33.333% - 16px);
    }
  }

  /* Lightbox */
  .lightbox-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.75);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    cursor: pointer;
  }

  .lightbox-overlay.active {
    display: flex;
  }

  .lightbox-inner {
    position: relative;
    height: 95vh;
    aspect-ratio: 1200 / 1665;
    max-width: 100vw;
  }

  .lightbox-overlay img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    pointer-events: none;
    border-radius: 3.5%;
  }

  .lightbox-btn {
    display: none;
    position: absolute;
    pointer-events: auto;
    cursor: pointer;
    background: transparent;
    border-radius: 14px;
    text-decoration: none;
    border: none;
    color: transparent;
    font-size: 0;
    transition: background 0.2s ease;
  }

  .lightbox-btn:hover {
    backdrop-filter: brightness(1.12);
    -webkit-backdrop-filter: brightness(1.12);
  }

  .lb-card2-tickets {
    bottom: 7.4%;
    left: 12.8%;
    width: 75.1%;
    height: 10.2%;
  }

  .lb-card6-info {
    bottom: 22.6%;
    left: 12.6%;
    width: 73.8%;
    height: 10.2%;
  }

  .lb-card6-contact {
    bottom: 7.5%;
    left: 12.6%;
    width: 73.8%;
    height: 10.2%;
  }

  .lightbox-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 56px;
    height: 56px;
    border: none;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.18);
    color: rgba(255, 255, 255, 0.85);
    font-size: 28px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-bottom: 2px;
    transition: background 0.2s ease, color 0.2s ease;
    z-index: 1001;
    pointer-events: auto;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }

  .lightbox-arrow:hover {
    background: rgba(255, 255, 255, 0.3);
    color: #fff;
  }

  /* Arrow offset: 47.5vh = half of .lightbox-inner 95vh height;
     * 1200/1665 converts height to width via aspect ratio;
     * result is the gap between lightbox edge and viewport edge */
  .lightbox-arrow-left {
    left: calc((50% - 47.5vh * 1200/1665) / 4 * 3 - 28px);
    padding-right: 3px;
  }

  .lightbox-arrow-right {
    right: calc((50% - 47.5vh * 1200/1665) / 4 * 3 - 28px);
    padding-left: 3px;
  }

  @media (max-width: 600px) {
    .lightbox-arrow {
      width: 40px;
      height: 40px;
      font-size: 20px;
    }
    .lightbox-arrow-left { left: calc((50% - 47.5vh * 1200/1665) / 4 * 3 - 20px); }
    .lightbox-arrow-right { right: calc((50% - 47.5vh * 1200/1665) / 4 * 3 - 20px); }
  }

  /* Landscape grid - triggered by JS .landscape-mode class */
  body.landscape-mode {
    overflow: auto;
    height: auto;
  }
  body.landscape-mode .card-grid {
    flex-direction: row;
    flex-wrap: wrap;
    overflow-y: auto;
    overflow-x: hidden;
    scroll-snap-type: none;
    padding: 40px;
    gap: 24px;
    height: auto;
    max-width: 1600px;
  }
  body.landscape-mode .card-link {
    flex: none;
    width: calc(50% - 12px);
    height: auto;
    scroll-snap-align: none;
    display: block;
    aspect-ratio: 1200 / 1665;
    cursor: pointer;
  }
  body.landscape-mode .card-container {
    flex: none;
    width: calc(50% - 12px);
    height: auto;
    scroll-snap-align: none;
    display: block;
    aspect-ratio: 1200 / 1665;
    cursor: pointer;
    transition: transform 0.35s ease;
  }
  body.landscape-mode .card-link picture,
  body.landscape-mode .card-container picture {
    display: block;
    width: 100%;
    height: 100%;
  }
  body.landscape-mode .card-link img,
  body.landscape-mode .card-container img,
  body.landscape-mode picture img {
    width: 100%;
    height: 100%;
    max-width: none;
    max-height: none;
    object-fit: contain;
    border-radius: 3.5%;
  }
  body.landscape-mode .card-link:hover img {
    transform: scale(1.03);
  }
  body.landscape-mode .card-container:hover {
    transform: scale(1.03);
  }

  
    picture img {
      width: auto;
      max-width: 95vw;
      height: auto;
      max-height: calc(88vh - 20px);
      display: block;
      border-radius: 3.5%;
    }
  }


  /* Landscape lightbox - triggered by JS .landscape-mode class */
  body.landscape-mode .lightbox-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
    z-index: 1000;
    overflow-y: scroll;
    -webkit-overflow-scrolling: touch;
  }
  body.landscape-mode .lightbox-overlay.active {
    display: block;
  }
  body.landscape-mode .lightbox-inner {
    width: 60vw;
    height: auto;
    aspect-ratio: auto;
    max-width: none;
    margin: 3vh auto;
    position: relative;
  }
  body.landscape-mode .lightbox-overlay img {
    width: 100%;
    height: auto;
    pointer-events: auto;
    object-fit: contain;
    border-radius: 3.5%;
    display: block;
  }
  body.landscape-mode .lightbox-arrow {
    display: none !important;
  }
</style>
</head>
<body>
<div class="card-grid">
  <div class="card-link">
    <picture>
      <source media="(max-width: 1200px) and (orientation: portrait)" srcset="images/card-01_mobile.jpg">
      <img src="images/card-01.jpg" alt="Perfect Beasts" width="1200" height="1665">
    </picture>
  </div>
  <div class="card-container">
    <div class="card-link-bg">
      <picture>
        <source media="(max-width: 1200px) and (orientation: portrait)" srcset="images/card-02_mobile.jpg">
        <img src="images/card-02.jpg" loading="lazy" alt="Modern Bouffon" width="1200" height="1665">
      </picture>
      <a class="tickets-btn" href="https://events.humanitix.com/perfect-beasts-show?h=SiM6BMJovS77kORXZSL4397t2JGi-UL91hsHhQG78Pg&amp;t=1773109967777" target="_blank" rel="noopener">Tickets</a>
    </div>
  </div>
  <div class="card-link">
    <picture>
      <source media="(max-width: 1200px) and (orientation: portrait)" srcset="images/card-03_mobile.jpg">
      <img src="images/card-03.jpg" loading="lazy" alt="Bouffon Info" width="1200" height="1665">
    </picture>
  </div>
  <div class="card-link">
    <picture>
      <source media="(max-width: 1200px) and (orientation: portrait)" srcset="images/card-04_mobile.jpg">
      <img src="images/card-04.jpg" loading="lazy" alt="Minotaur" width="1200" height="1665">
    </picture>
  </div>
  <div class="card-link">
    <picture>
      <source media="(max-width: 1200px) and (orientation: portrait)" srcset="images/card-05_mobile.jpg">
      <img src="images/card-05.jpg" loading="lazy" alt="Mimi" width="1200" height="1665">
    </picture>
  </div>
  <div class="card-container">
    <div class="card-link-bg">
      <picture>
        <source media="(max-width: 1200px) and (orientation: portrait)" srcset="images/card-06_mobile.jpg">
        <img src="images/card-06.jpg" loading="lazy" alt="Workshop" width="1200" height="1665">
      </picture>
      <a class="tickets-btn btn-workshop-info" href="https://events.humanitix.com/perfect-beasts-workshop?h=KWJzFsmMzytsI2L-ip8YO90t5slrTo0ZabbFX4dDF9o&amp;t=1773102944347" target="_blank" rel="noopener">Info & Registration</a>
      <a class="tickets-btn btn-workshop-contact" href="mailto:betesparfaites@protonmail.com">Contact</a>
    </div>
  </div>
</div>

<div class="lightbox-overlay" id="lightbox">
  <button class="lightbox-arrow lightbox-arrow-left" id="lightbox-prev">&#8249;</button>
  <div class="lightbox-inner">
    <img id="lightbox-img" src="" alt="Lightbox">
    <a class="lightbox-btn lb-card2-tickets" href="https://events.humanitix.com/perfect-beasts-show?h=SiM6BMJovS77kORXZSL4397t2JGi-UL91hsHhQG78Pg&amp;t=1773109967777" target="_blank" rel="noopener">Tickets</a>
    <a class="lightbox-btn lb-card6-info" href="https://events.humanitix.com/perfect-beasts-workshop?h=KWJzFsmMzytsI2L-ip8YO90t5slrTo0ZabbFX4dDF9o&amp;t=1773102944347" target="_blank" rel="noopener">Info & Registration</a>
    <a class="lightbox-btn lb-card6-contact" href="mailto:betesparfaites@protonmail.com">Contact</a>
  </div>
  <button class="lightbox-arrow lightbox-arrow-right" id="lightbox-next">&#8250;</button>
</div>


<script>
  const overlay = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');
  const lbCard2Tickets = document.querySelector('.lb-card2-tickets');
  const lbCard6Info = document.querySelector('.lb-card6-info');
  const lbCard6Contact = document.querySelector('.lb-card6-contact');
  const prevBtn = document.getElementById('lightbox-prev');
  const nextBtn = document.getElementById('lightbox-next');

  const cards = [];
  document.querySelectorAll('.card-link, .card-container').forEach((card, idx) => {
    const img = card.querySelector('img');
    if (img) {
      cards.push({ src: img.src, cardIndex: idx, el: card });
    }
  });

  let currentIndex = 0;

  function showCard(index) {
    currentIndex = index;
    lightboxImg.src = cards[index].src;
    const ci = cards[index].cardIndex;
    lbCard2Tickets.style.display = ci === 1 ? 'block' : 'none';
    lbCard6Info.style.display = ci === 5 ? 'block' : 'none';
    lbCard6Contact.style.display = ci === 5 ? 'block' : 'none';
    }

  function closeLightbox() {
    overlay.classList.remove('active');
    document.body.style.overflow = '';
  }

  function isMobile() {
    return window.innerWidth <= 1200 && window.innerHeight > window.innerWidth;
  }

  cards.forEach((card, i) => {
    card.el.addEventListener('click', (e) => {
      if (e.target.closest('.tickets-btn')) return;
      if (isMobile()) return;
      e.preventDefault();
      showCard(i);
      overlay.classList.add('active');
      document.body.style.overflow = 'hidden';
      lightboxImg.addEventListener('load', function scrollReset() {
        overlay.scrollTop = 0;
        lightboxImg.removeEventListener('load', scrollReset);
      }, { once: true });
      overlay.scrollTop = 0;
    });
  });

  prevBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    showCard((currentIndex - 1 + cards.length) % cards.length);
  });

  nextBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    showCard((currentIndex + 1) % cards.length);
  });

  // Track touch movement to distinguish scroll from tap
  let touchStartY = 0;
  let touchMoved = false;
  overlay.addEventListener('touchstart', (e) => {
    touchStartY = e.touches[0].clientY;
    touchMoved = false;
  }, { passive: true });
  overlay.addEventListener('touchmove', () => {
    touchMoved = true;
  }, { passive: true });

  overlay.addEventListener('click', (e) => {
    if (e.target.closest('.lightbox-arrow')) return;
    if (e.target.closest('.lightbox-btn')) return;
    if (touchMoved) { touchMoved = false; return; }
    closeLightbox();
  });

  document.addEventListener('keydown', (e) => {
    if (!overlay.classList.contains('active')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') showCard((currentIndex - 1 + cards.length) % cards.length);
    if (e.key === 'ArrowRight') showCard((currentIndex + 1) % cards.length);
  });





  
  // Detect landscape mode and toggle class
  function updateOrientation() {
    if (window.innerWidth <= 1200 && window.innerWidth > window.innerHeight) {
      document.body.classList.add('landscape-mode');
    } else {
      document.body.classList.remove('landscape-mode');
    }
  }
  updateOrientation();
  window.addEventListener('resize', updateOrientation);
  window.addEventListener('orientationchange', () => {
    setTimeout(updateOrientation, 100);
  });

  const grid = document.querySelector('.card-grid');

  // One-time bounce on first load to hint at scrollability
  if (isMobile()) {
    window.addEventListener('load', () => {
      setTimeout(() => {
        grid.scrollTo({ top: 60, behavior: 'smooth' });
        setTimeout(() => {
          grid.scrollTo({ top: 0, behavior: 'smooth' });
        }, 400);
      }, 800);
    });
  }
</script>
</body>
</html>
