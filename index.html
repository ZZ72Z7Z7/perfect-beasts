<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    display: flex;
    justify-content: center;
    background: #333;
    min-height: 100vh;
  }
  
  .grid {
    display: flex;
    flex-wrap: wrap;
    max-width: 1600px;
    width: 100%;
    padding: 60px;
    gap: 24px;
  }

  picture {
    display: block;
    width: 100%;
    height: 100%;
  }
  
  /* Test 1: img directly in div */
  .card-a {
    display: block;
    width: calc(50% - 12px);
    aspect-ratio: 1200 / 1665;
    background: red;
  }
  .card-a img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  
  /* Test 2: picture > img in div */
  .card-b {
    display: block;
    width: calc(50% - 12px);
    aspect-ratio: 1200 / 1665;
    background: blue;
  }
  .card-b img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  /* Test 3: picture > img in div, NO picture sizing */
  .card-c {
    display: block;
    width: calc(50% - 12px);
    aspect-ratio: 1200 / 1665;
    background: green;
  }
  .card-c picture {
    /* override the global rule */
    width: auto;
    height: auto;
  }
  .card-c img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  h3 { color: white; width: 100%; }
</style>
</head>
<body>
<div class="grid">
  <h3>Card A: img directly (should work)</h3>
  <div style="width:100%"></div>
  
  <div class="card-a">
    <img src="https://picsum.photos/1200/1665" alt="direct">
  </div>
  <div class="card-a">
    <img src="https://picsum.photos/1200/1665" alt="direct2">
  </div>

  <h3>Card B: picture with width/height 100% (our fix)</h3>
  <div style="width:100%"></div>

  <div class="card-b">
    <picture>
      <img src="https://picsum.photos/1200/1665" alt="picture" width="1200" height="1665">
    </picture>
  </div>
  <div class="card-b">
    <picture>
      <img src="https://picsum.photos/1200/1665" alt="picture2" width="1200" height="1665">
    </picture>
  </div>

  <h3>Card C: picture WITHOUT sizing (broken?)</h3>
  <div style="width:100%"></div>

  <div class="card-c">
    <picture>
      <img src="https://picsum.photos/1200/1665" alt="nosizing" width="1200" height="1665">
    </picture>
  </div>
  <div class="card-c">
    <picture>
      <img src="https://picsum.photos/1200/1665" alt="nosizing2" width="1200" height="1665">
    </picture>
  </div>
</div>
</body>
</html>
